<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Base</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>
  <div id="app">
    <!-- Left column: Directory tree -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <h2>Knowledge Base</h2>
      </div>
      <div id="tree-container"></div>
    </aside>

    <!-- Center column: Main content -->
    <main id="center">
      <div id="search-box">
        <input type="text" id="search-input" placeholder="Search documents...">
        <div id="search-results" class="hidden"></div>
      </div>

      <div id="tag-cloud"></div>

      <div id="doc-header" class="hidden">
        <h1 id="doc-title"></h1>
        <div id="doc-meta"></div>
        <div id="doc-actions">
          <button id="btn-edit" class="hidden">Edit</button>
          <button id="btn-save" class="hidden">Save</button>
          <button id="btn-cancel" class="hidden">Cancel</button>
        </div>
      </div>

      <div id="doc-content"></div>

      <div id="editor-area" class="hidden">
        <textarea id="editor-textarea"></textarea>
      </div>
    </main>

    <!-- Right column: Backlinks -->
    <aside id="backlinks-panel">
      <h3>Backlinks</h3>
      <ul id="backlinks-list"></ul>
    </aside>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
